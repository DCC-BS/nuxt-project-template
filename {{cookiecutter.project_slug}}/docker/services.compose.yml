services:

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  llm:
    platform: linux/amd64
    image: vllm/vllm-openai:v0.11.2
    container_name: llm
    expose:
      - "8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HUGGING_FACE_CACHE_DIR=${HUGGING_FACE_CACHE_DIR}
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    volumes:
      - ${HUGGING_FACE_CACHE_DIR}:/root/.cache/huggingface
    command: >
      Qwen/Qwen3-32B-AWQ
      --port 8000
      --max-model-len 10000
      --max-num-seqs 1
      --gpu-memory-utilization 0.75
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --tensor-parallel-size 2
      --reasoning-parser deepseek_r1

  {{cookiecutter.project_slug}}-backend:
    image: ghcr.io/dcc-bs/{{cookiecutter.project_slug}}-backend:latest
    expose:
      - "8000"
    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      - LLM_KEY=${LLM_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_HEALTH_CHECK_URL=${LLM_HEALTH_CHECK_URL}
      - LOG_LEVEL=${LOG_LEVEL}
      - PORT=${BACKEND_PORT}

  {{cookiecutter.project_slug}}-frontend:
    container_name: {{cookiecutter.project_slug}}-frontend
    build:
      context: ..
      dockerfile: ../Dockerfile
{% if cookiecutter.use_azure_auth == "yes" %}
    environment:
      - NUXT_AZURE_AUTH_CLIENT_ID=${NUXT_AZURE_AUTH_CLIENT_ID:-}
      - NUXT_AZURE_AUTH_TENANT_ID=${NUXT_AZURE_AUTH_TENANT_ID:-}
      - NUXT_AZURE_AUTH_CLIENT_SECRET=${NUXT_AZURE_AUTH_CLIENT_SECRET:-}
      - NUXT_AZURE_AUTH_API_CLIENT_ID=${NUXT_AZURE_AUTH_API_CLIENT_ID:-}
      - NUXT_AZURE_AUTH_ORIGIN=http://localhost:8090/api/auth
{% endif %}
      - NUXT_API_URL=http://{{cookiecutter.project_slug}}-backend:8000
      - PORT=3000
    expose:
      - 3000
